services:
  mongo:
    image: mongo:7
    container_name: holdem_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: holdem
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7
    container_name: holdem_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  mongo_data:
